<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
    <title>study-list</title>
</head>

<body>
    <header>
        <h1>学習計画アプリー今日のタスクと教材管理</h1>

        <nav>
            <button class="tab active" id="homeBtn">ホーム</button>
            <button class="tab" id="addBtn">教材追加</button>
            <button class="tab" id="listBtn">一覧</button>
        </nav>
    </header>

    <main>

        <!--ホーム-->
        <section id="homePage">
            <h2>今日のタスク</h2>

            <div id="taskContainer">
                <p>教材を追加してください</p>
            </div>
        </section>

        <section id="addPage" class="hidden">
            <!--教材を追加-->
            <form id="bookForm" class="form-card">
                <div class="form-group">
                    <label>教材名</label>
                    <input type="text" id="title" placeholder="例：英単語ターゲット1900">
                </div>

                <div class="form-group">
                    <label>総ページ数</label>
                    <input type="number" id="totalPages" placeholder="例：500">
                </div>

                <div class="form-group">
                    <label>現在ページ</label>
                    <input type="number" id="currentPage" placeholder="例：120">
                </div>

                <div class="form-group">
                    <label>期限</label>
                    <input type="date" id="deadline">
                </div>
                <button type="submit">追加する</button>
            </form>
        </section>

        <!--一覧-->
        <section id="listPage" class="hidden">
            <div class="list-header">
                <h2>教材一覧</h2>
                <button id="clearBtn" class="clear-btn">
                    全教材削除
                </button>
            </div>
            <div id="bookList"></div>

        </section>



    </main>





    <script src="app.js"></script>
</body>

</html>
